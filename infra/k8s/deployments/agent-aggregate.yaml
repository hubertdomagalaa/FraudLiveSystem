apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-aggregate
  namespace: fraud-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: agent-aggregate
  template:
    metadata:
      labels:
        app: agent-aggregate
    spec:
      containers:
        - name: agent-aggregate
          image: fraud/agent-aggregate:latest
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: agent-aggregate
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: fraud-platform-config
            - secretRef:
                name: fraud-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
