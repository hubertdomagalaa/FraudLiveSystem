apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-orchestrator
  namespace: fraud-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: decision-orchestrator
  template:
    metadata:
      labels:
        app: decision-orchestrator
    spec:
      containers:
        - name: decision-orchestrator
          image: fraud/decision-orchestrator:latest
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: decision-orchestrator
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: fraud-platform-config
            - secretRef:
                name: fraud-platform-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
