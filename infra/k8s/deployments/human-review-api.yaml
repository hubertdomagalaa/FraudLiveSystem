apiVersion: apps/v1
kind: Deployment
metadata:
  name: human-review-api
  namespace: fraud-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: human-review-api
  template:
    metadata:
      labels:
        app: human-review-api
    spec:
      containers:
        - name: human-review-api
          image: fraud/human-review-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fraud-platform-config
            - secretRef:
                name: fraud-platform-secrets
