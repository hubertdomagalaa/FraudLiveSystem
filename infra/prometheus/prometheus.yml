global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts/fraud_platform_rules.yml

scrape_configs:
  - job_name: ingestion-api
    static_configs:
      - targets: ["ingestion-api:8000"]
  - job_name: decision-orchestrator
    static_configs:
      - targets: ["decision-orchestrator:8000"]
  - job_name: agent-context
    static_configs:
      - targets: ["agent-context:8000"]
  - job_name: agent-risk-ml
    static_configs:
      - targets: ["agent-risk-ml:8000"]
  - job_name: agent-policy
    static_configs:
      - targets: ["agent-policy:8000"]
  - job_name: agent-llm-explainer
    static_configs:
      - targets: ["agent-llm-explainer:8000"]
  - job_name: agent-aggregate
    static_configs:
      - targets: ["agent-aggregate:8000"]
  - job_name: human-review-api
    static_configs:
      - targets: ["human-review-api:8000"]
  - job_name: dlq-ops-api
    static_configs:
      - targets: ["dlq-ops-api:8000"]
