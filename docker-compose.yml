version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fraud_platform
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ingestion-api:
    build:
      context: .
      dockerfile: services/ingestion-api/Dockerfile
    environment:
      SERVICE_NAME: ingestion-api
      LOG_LEVEL: INFO
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  decision-orchestrator:
    build:
      context: .
      dockerfile: services/decision-orchestrator/Dockerfile
    environment:
      SERVICE_NAME: decision-orchestrator
      LOG_LEVEL: INFO
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: decision-orchestrator-1
    ports:
      - "8002:8000"
    depends_on:
      - postgres
      - redis

  agent-context:
    build:
      context: .
      dockerfile: services/agent-context/Dockerfile
    environment:
      SERVICE_NAME: agent-context
      LOG_LEVEL: INFO
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: agent-context-1
    ports:
      - "8010:8000"
    depends_on:
      - postgres
      - redis

  agent-risk-ml:
    build:
      context: .
      dockerfile: services/agent-risk-ml/Dockerfile
    environment:
      SERVICE_NAME: agent-risk-ml
      LOG_LEVEL: INFO
      MODEL_VERSION: stub-0.1
      DEFAULT_RISK_SCORE: 0.42
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: agent-risk-ml-1
    ports:
      - "8011:8000"
    depends_on:
      - postgres
      - redis

  agent-llm-explainer:
    build:
      context: .
      dockerfile: services/agent-llm-explainer/Dockerfile
    environment:
      SERVICE_NAME: agent-llm-explainer
      LOG_LEVEL: INFO
      PROVIDER: placeholder
      MODEL: stub-llm
      PROMPT_VERSION: v1
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: agent-llm-explainer-1
    ports:
      - "8012:8000"
    depends_on:
      - postgres
      - redis

  agent-policy:
    build:
      context: .
      dockerfile: services/agent-policy/Dockerfile
    environment:
      SERVICE_NAME: agent-policy
      LOG_LEVEL: INFO
      RULESET_VERSION: v1
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: agent-policy-1
    ports:
      - "8013:8000"
    depends_on:
      - postgres
      - redis

  agent-aggregate:
    build:
      context: .
      dockerfile: services/agent-aggregate/Dockerfile
    environment:
      SERVICE_NAME: agent-aggregate
      LOG_LEVEL: INFO
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: agent-aggregate-1
    ports:
      - "8014:8000"
    depends_on:
      - postgres
      - redis

  human-review-api:
    build:
      context: .
      dockerfile: services/human-review-api/Dockerfile
    environment:
      SERVICE_NAME: human-review-api
      LOG_LEVEL: INFO
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: human-review-api-1
    ports:
      - "8003:8000"
    depends_on:
      - postgres
      - redis

  dlq-ops-api:
    build:
      context: .
      dockerfile: services/dlq-ops-api/Dockerfile
    environment:
      SERVICE_NAME: dlq-ops-api
      LOG_LEVEL: INFO
      POSTGRES_DSN: postgresql://fraud:fraud@postgres:5432/fraud_platform
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: dlq-ops-api-1
    ports:
      - "8004:8000"
    depends_on:
      - postgres
      - redis

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
